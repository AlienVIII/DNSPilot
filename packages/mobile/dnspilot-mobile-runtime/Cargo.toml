[package]
name = "dnspilot-mobile-runtime"
version = "0.1.0"
edition = "2021"
license = "MIT"

[lib]
crate-type = ["lib", "staticlib", "cdylib"]

[dependencies]
dnspilot-core = { path = "../../../crates/dnspilot-core" }
serde = { version = "1", features = ["derive"] }
serde_json = "1"
thiserror = "2"

[dev-dependencies]
tempfile = "3"

[target.'cfg(target_os = "android")'.dependencies]
jni = "0.21"

[workspace]
